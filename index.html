<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Wireframe Viewer</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" /><link rel="stylesheet" href="style.css" /></head><body><canvas id="c"></canvas><div id="ui"><div id="title"><h1>Wireframe</h1><p>3D Object Viewer</p></div><div id="controls"><select id="obj-select" aria-label="Object selector" title="Object selector"></select><label id="fill-control" for="fill-opacity"><span>Fill Opacity</span><input id="fill-opacity" type="range" min="0" max="100" step="1" value="0" /><span id="fill-opacity-value">0%</span></label><label id="wire-control" for="wire-toggle"><span>Wireframe Overlay</span><span id="wire-switch"><input id="wire-toggle" type="checkbox" checked /><span id="wire-slider"></span></span></label><div id="stats"><span>Vertices <span id="stat-v">--</span></span><span>Edges <span id="stat-e">--</span></span></div></div><div id="footer"><div id="obj-label"></div><div id="hint">Drag to rotate • Scroll to zoom</div></div></div><script src="js/math3d.js"></script><script src="js/objects/loader.js"></script><script src="js/app.js"></script></body></html>
