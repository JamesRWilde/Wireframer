<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scratchpad — WIREFRAMR Debug</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; display: flex; flex-direction: column; align-items: center;
         justify-content: center; height: 100vh; color: #8af; font-family: monospace; }
  canvas { border: 1px solid #335; display: block; margin-top: 12px; }
  h1 { font-size: 18px; margin-bottom: 8px; }
  #status { font-size: 13px; color: #6a8; margin-top: 8px; }
  #log { font-size: 11px; color: #567; margin-top: 4px; max-width: 900px; text-align: center; }
</style>
</head>
<body>
<h1>Scratchpad Pipeline Debug</h1>
<canvas id="c" width="1920" height="1080"></canvas>
<div id="status">Loading OBJ...</div>
<div id="log"></div>

<script type="importmap">
{
  "imports": {
    "@engine/": "./engine/",
    "@ui/": "./ui/",
    "@workers/": "./workers/"
  }
}
</script>

<script type="module">
// ============================================================
// STAGE 0 — The working baseline.
// Parse OBJ, center, orthographic project, draw faces.
// ============================================================

const OBJ_PATH = '/meshes/jet-fighter.obj';
const CANVAS_W = 1920;
const CANVAS_H = 1080;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

function log(msg) { logEl.textContent = msg; }

// --- OBJ Parser (minimal: v, f only) ---
function parseOBJ(text) {
  const rawVerts = [];
  const rawUVs = [];
  const faces = [];
  const lines = text.split('\n');
  let failed = 0;

  for (const line of lines) {
    if (!line || line[0] === '#') continue;
    const p = line.trim().split(/\s+/);
    if (p[0] === 'v' && p.length >= 4) {
      rawVerts.push([+p[1], +p[2], +p[3]]);
    } else if (p[0] === 'vt' && p.length >= 3) {
      rawUVs.push([+p[1], +p[2]]);
    } else if (p[0] === 'f') {
      // Parse face tokens: v, v/vt, v/vt/vn, v//vn
      const fv = p.slice(1).map(tok => {
        const parts = tok.split('/');
        let vi = parseInt(parts[0]);
        if (vi < 0) vi = rawVerts.length + vi + 1; // negative relative indexing
        vi = vi - 1; // OBJ is 1-based
        let vti = parts[1] ? parseInt(parts[1]) : null;
        if (vti !== null) {
          if (vti < 0) vti = rawUVs.length + vti + 1;
          vti = vti - 1;
        }
        return { vi, vti };
      });

      // Fan triangulate
      for (let i = 1; i < fv.length - 1; i++) {
        const tri = [fv[0], fv[i], fv[i + 1]];
        // Build unique vertex entries (position + UV)
        faces.push(tri);
      }
    }
  }

  return { rawVerts, rawUVs, faces };
}

// --- Build unique vertex array with proper dedup ---
function buildUniqueVertices(rawVerts, rawUVs, faces) {
  const vertMap = new Map();
  const uniqueVerts = [];
  const triIndices = [];

  for (const face of faces) {
    const tri = [];
    for (const fv of face) {
      const key = `${fv.vi}/${fv.vti ?? ''}`;
      let idx = vertMap.get(key);
      if (idx === undefined) {
        const pos = rawVerts[fv.vi] || [0, 0, 0];
        const uv = (fv.vti !== null && rawUVs[fv.vti]) ? rawUVs[fv.vti] : [0, 0];
        idx = uniqueVerts.length;
        uniqueVerts.push([pos[0], pos[1], pos[2], uv[0], uv[1]]);
        vertMap.set(key, idx);
      }
      tri.push(idx);
    }
    // Only keep triangles where all 3 vertices are unique
    if (tri.length === 3 && tri[0] !== tri[1] && tri[0] !== tri[2] && tri[1] !== tri[2]) {
      triIndices.push(tri);
    }
  }
  return { uniqueVerts, triIndices };
}

// --- Center vertices ---
function centerVertices(uniqueVerts) {
  let minx = Infinity, maxx = -Infinity;
  let miny = Infinity, maxy = -Infinity;
  let minz = Infinity, maxz = -Infinity;
  for (const v of uniqueVerts) {
    if (v[0] < minx) minx = v[0]; if (v[0] > maxx) maxx = v[0];
    if (v[1] < miny) miny = v[1]; if (v[1] > maxy) maxy = v[1];
    if (v[2] < minz) minz = v[2]; if (v[2] > maxz) maxz = v[2];
  }
  const cx = (minx + maxx) / 2;
  const cy = (miny + maxy) / 2;
  const cz = (minz + maxz) / 2;
  for (const v of uniqueVerts) {
    v[0] -= cx;
    v[1] -= cy;
    v[2] -= cz;
  }
  return {
    sizeX: maxx - minx,
    sizeY: maxy - miny,
    sizeZ: maxz - minz,
    cx, cy, cz
  };
}

// --- Rotate (matching engine: Y first, then X) ---
function rotate(v, ay, ax) {
  const x = v[0], y = v[1], z = v[2];
  const cosY = Math.cos(ay), sinY = Math.sin(ay);
  const cosX = Math.cos(ax), sinX = Math.sin(ax);
  const rx = cosY * x + sinY * z;
  const ry = -sinX * sinY * x + cosX * y + cosX * sinY * z;   // NOTE: check sign
  const rz = -sinY * x + cosY * z;
  return [rx, ry, rz];
}

// --- Compute face normals for Z-sort ---
function faceNormal(a, b, c) {
  const ux = b[0]-a[0], uy = b[1]-a[1], uz = b[2]-a[2];
  const vx = c[0]-a[0], vy = c[1]-a[1], vz = c[2]-a[2];
  return [
    uy*vz - uz*vy,
    uz*vx - ux*vz,
    ux*vy - uy*vx
  ];
}

function faceArea(n) {
  return Math.sqrt(n[0]*n[0] + n[1]*n[1] + n[2]*n[2]);
}

// --- Render ---
function render(uniqueVerts, triIndices, bounds, ay = 0, ax = 0) {

  const halfW = CANVAS_W / 2;
  const halfH = CANVAS_H / 2;

  // Auto-fit scale: model should fill ~80% of the smaller canvas dimension
  const maxSize = Math.max(bounds.sizeX, bounds.sizeY);
  const scale = (CANVAS_H * 0.8) / maxSize;

  // Project all vertices
  const projected = [];
  const rotated = [];
  for (const v of uniqueVerts) {
    const r = rotate(v, ay, ax);
    rotated.push(r);
    projected.push([
      halfW + r[0] * scale,
      halfH - r[1] * scale
    ]);
  }

  // Build face list with average Z for sorting
  const faces = triIndices.map((tri, i) => {
    const a = rotated[tri[0]], b = rotated[tri[1]], c = rotated[tri[2]];
    const avgZ = (a[2] + b[2] + c[2]) / 3;
    return { tri, avgZ, idx: i };
  });

  // Sort back-to-front
  faces.sort((a, b) => a.avgZ - b.avgZ);

  // Clear
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Draw faces
  for (const f of faces) {
    const [ia, ib, ic] = f.tri;
    const pa = projected[ia], pb = projected[ib], pc = projected[ic];

    // Fill with dark color
    ctx.beginPath();
    ctx.moveTo(pa[0], pa[1]);
    ctx.lineTo(pb[0], pb[1]);
    ctx.lineTo(pc[0], pc[1]);
    ctx.closePath();
    ctx.fillStyle = '#1a2030';
    ctx.fill();

    // Stroke edges
    ctx.strokeStyle = '#5af';
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }
}

// --- Stage registry ---
// Each stage is a named function that transforms the data.
// We call them in order. If a stage breaks the jet, we know which one.
const STAGES = [];

function addStage(name, fn) {
  STAGES.push({ name, fn });
}

// STAGE 0: Parse OBJ
addStage('parseOBJ', (data) => {
  const { rawVerts, rawUVs, faces } = parseOBJ(data.objText);
  data.rawVerts = rawVerts;
  data.rawUVs = rawUVs;
  data.faces = faces;
  return `parsed ${rawVerts.length} verts, ${faces.length} faces`;
});

// STAGE 1: Build unique vertices
addStage('buildUniqueVerts', (data) => {
  const { uniqueVerts, triIndices } = buildUniqueVertices(data.rawVerts, data.rawUVs, data.faces);
  data.uniqueVerts = uniqueVerts;
  data.triIndices = triIndices;
  return `built ${uniqueVerts.length} unique verts, ${triIndices.length} triangles`;
});

// STAGE 2: Center vertices
addStage('center', (data) => {
  const info = centerVertices(data.uniqueVerts);
  data.bounds = info;
  return `centered (${info.sizeX.toFixed(1)} x ${info.sizeY.toFixed(1)} x ${info.sizeZ.toFixed(1)})`;
});

// STAGE 3: Render (no rotation — front view)
addStage('render', (data) => {
  data.ay = data.ay || 0;
  data.ax = data.ax || 0;
  render(data.uniqueVerts, data.triIndices, data.bounds, data.ay, data.ax);
  return `rendered ${data.triIndices.length} triangles`;
});

// STAGE 4: Engine rotation (Y=0.4, X=0.18)
addStage('engineRotation', (data) => {
  data.ay = 0.4;
  data.ax = 0.18;
  render(data.uniqueVerts, data.triIndices, data.bounds, 0.4, 0.18);
  return `rotation Y=0.4, X=0.18 — re-render`;
});

// STAGE 5: Use engine's toRuntime parser instead of scratchpad parser
// This tests whether the engine's parsing produces the same vertex/face data
addStage('engineParser', async (data) => {
  // Dynamically import the engine's parser
  const { toRuntime } = await import('/engine/init/mesh/toRuntime.js');
  const mesh = toRuntime(data.objText, { meshFileName: 'jet-fighter.obj', meshType: 'OBJ' });

  // toRuntime returns { V, F, triangles, ... }
  // V[i] = [x, y, z, u, v, nx, ny, nz] (8 elements)
  // F[i] = { indices: [a, b, c], ... }
  // triangles[i] = [a, b, c]

  // Center the vertices (same as load.js does)
  const V = mesh.V;
  let minx=Infinity,maxx=-Infinity,miny=Infinity,maxy=-Infinity,minz=Infinity,maxz=-Infinity;
  for (let i = 0; i < V.length; i++) {
    if(V[i][0]<minx)minx=V[i][0];if(V[i][0]>maxx)maxx=V[i][0];
    if(V[i][1]<miny)miny=V[i][1];if(V[i][1]>maxy)maxy=V[i][1];
    if(V[i][2]<minz)minz=V[i][2];if(V[i][2]>maxz)maxz=V[i][2];
  }
  const cx=(minx+maxx)*0.5, cy=(miny+maxy)*0.5, cz=(minz+maxz)*0.5;
  for (let i = 0; i < V.length; i++) {
    V[i][0] -= cx; V[i][1] -= cy; V[i][2] -= cz;
  }

  data.uniqueVerts = V;
  data.triIndices = mesh.triangles;
  data.bounds = { sizeX: maxx-minx, sizeY: maxy-miny, sizeZ: maxz-minz, cx, cy, cz };

  // Re-render with engine parser data
  render(data.uniqueVerts, data.triIndices, data.bounds, data.ay || 0, data.ax || 0);
  return `engine parser: ${V.length} verts, ${data.triIndices.length} tris`;
});

// STAGE 6: Engine's transformSync (orthographic projection via engine code)
// This is the same code path the engine uses in non-worker mode
addStage('engineTransform', async (data) => {
  const { transformSync } = await import('/engine/get/render/worker/transformSync.js');
  const { frameParams } = await import('/engine/get/render/compute/frameParams.js');

  const V = data.uniqueVerts;
  const verts = V.length;
  const ay = data.ay || 0;
  const ax = data.ax || 0;

  // Build rotation matrix (matching engine's toRowMajorRotation)
  const cosY = Math.cos(ay), sinY = Math.sin(ay);
  const cosX = Math.cos(ax), sinX = Math.sin(ax);
  // Row-major rotation: Y * X
  const R = [
    cosY, sinX * sinY, -cosX * sinY,
    0,    cosX,        sinX,
    -sinY, sinX * cosY, cosX * cosY
  ];

  // Compute frame params (cy center) using centered vertices
  const params = frameParams(V);
  const cy = params.cy;

  // Auto-fit zoom (matching engine's fitCameraToModel logic)
  let minx=Infinity,maxx=-Infinity,miny=Infinity,maxy=-Infinity;
  for (const v of V) {
    if(v[0]<minx)minx=v[0];if(v[0]>maxx)maxx=v[0];
    if(v[1]<miny)miny=v[1];if(v[1]>maxy)maxy=v[1];
  }
  const maxExtent = Math.max(maxx-minx, maxy-miny);
  const targetFraction = 0.5;
  const ZOOM = Math.max(0.001, targetFraction / (0.9 * maxExtent));
  const fov = 1080 * 0.9 * ZOOM;

  const halfW = 1920 / 2;
  const halfH = 1080 / 2;

  // Call engine's transformSync
  const { T, P2 } = transformSync(V, R, fov, halfW, halfH, cy, verts);

  // Draw using engine's P2 projections
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const faces = data.triIndices;
  // Sort by average Z (back to front)
  const sortedFaces = faces.map((tri) => {
    const avgZ = (T[tri[0]][2] + T[tri[1]][2] + T[tri[2]][2]) / 3;
    return { tri, avgZ };
  }).sort((a, b) => a.avgZ - b.avgZ);

  for (const f of sortedFaces) {
    const [ia, ib, ic] = f.tri;
    const pa = P2[ia], pb = P2[ib], pc = P2[ic];
    ctx.beginPath();
    ctx.moveTo(pa[0], pa[1]);
    ctx.lineTo(pb[0], pb[1]);
    ctx.lineTo(pc[0], pc[1]);
    ctx.closePath();
    ctx.fillStyle = '#1a2030';
    ctx.fill();
    ctx.strokeStyle = '#5af';
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  return `engine transformSync: fov=${fov.toFixed(2)}, ZOOM=${ZOOM.toFixed(4)}, verts=${verts}`;
});

// --- Run pipeline ---
async function main() {
  const resp = await fetch(OBJ_PATH);
  if (!resp.ok) { statusEl.textContent = 'Failed to load OBJ'; return; }
  const objText = await resp.text();
  log(`OBJ loaded (${objText.length} bytes)`);

  const data = { objText };
  let statusText = '';

  for (const stage of STAGES) {
    statusText = stage.fn(data);
    log(`${stage.name}: ${statusText}`);
  }

  statusEl.textContent = 'Pipeline complete — jet rendered';
}

main().catch(err => {
  statusEl.textContent = 'Error: ' + err.message;
  console.error(err);
});
</script>
</body>
</html>
